# Name of your application. Used to uniquely configure containers.
service: pruf

# Name of the container image (use your-user/app-name on external registries).
image: kieranklaassen/pruf

# Deploy to these servers. Shares the host (and kamal-proxy) with diskman —
# never run `kamal proxy reboot` or full `kamal remove` here; teardown is
# `kamal app remove` only.
servers:
  web:
    - cora-hetzner

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# DNS: Cloudflare A record `pruf` -> 5.78.191.151, DNS-only (grey cloud).
# If flipping to proxied later, set Cloudflare SSL/TLS mode to "Full (strict)" once the cert exists.
proxy:
  ssl: true
  host: pruf.kieranklaassen.com

# Where you keep your container images.
registry:
  server: ghcr.io
  username: kieranklaassen
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    # Optional: AI suggestions fall back to canned text when absent/empty.
    - GEMINI_API_KEY
  clear:
    # SQLite: single Puma worker process avoids multi-process contention on the same DB files.
    # NOTE: app/services/yjs_persistence.rb also assumes single-process (in-process per-doc lock) —
    # revisit cross-process merge safety before ever bumping this.
    WEB_CONCURRENCY: "1"

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Persistent volume holds the SQLite databases (storage/production*.sqlite3)
# and Active Storage files. Single host only — SQLite cannot scale out.
volumes:
  - "pruf_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/vite

# Build remotely on the server itself (native amd64 builds from an arm64 Mac).
# The buildx builder is shared with diskman (named per remote URL) — don't
# build both apps concurrently.
builder:
  arch: amd64
  remote: ssh://ubuntu@cora-hetzner

ssh:
  user: ubuntu
