service: pruf
image: kieranklaassen/pruf

servers:
  web:
    - cora-hetzner

proxy:
  ssl: true
  host: pruf.kieranklaassen.com
  buffering:
    requests: true
    responses: true
    memory: 2_097_152
    max_request_body: 3_407_872

registry:
  server: ghcr.io
  username: kieranklaassen
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    # SQLite and the database-backed Cable adapter share one persistent volume.
    WEB_CONCURRENCY: "1"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "pruf_storage:/rails/storage"

# Keep fingerprinted Vite assets available while the proxy drains an old release.
asset_path: /rails/public/vite

builder:
  arch: amd64
  remote: ssh://ubuntu@cora-hetzner

ssh:
  user: ubuntu
