service: <%= ENV.fetch("KAMAL_SERVICE") %>
image: <%= ENV.fetch("KAMAL_IMAGE") %>

servers:
  web:
<% ENV.fetch("KAMAL_HOSTS").split(",").map(&:strip).reject(&:empty?).each do |host| %>
    - <%= host %>
<% end %>

proxy:
  ssl: true
  hosts:
<% ENV.fetch("KAMAL_PROXY_HOSTS").split(",").map(&:strip).reject(&:empty?).each do |host| %>
    - <%= host %>
<% end %>
  buffering:
    requests: true
    responses: true
    memory: 2_097_152
    max_request_body: 3_407_872

registry:
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "ghcr.io") %>
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
<% if ENV["KAMAL_GOOGLE_OAUTH"] == "1" %>
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
<% end %>
  clear:
    # SQLite and the database-backed Cable adapter share one persistent volume.
    WEB_CONCURRENCY: "1"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

volumes:
  - "<%= ENV.fetch("KAMAL_STORAGE_VOLUME") %>:/rails/storage"

# Keep fingerprinted Vite assets available while the proxy drains an old release.
asset_path: /rails/public/vite

builder:
  arch: <%= ENV.fetch("KAMAL_BUILDER_ARCH", "amd64") %>
<% unless ENV["KAMAL_BUILDER_REMOTE"].to_s.empty? %>
  remote: <%= ENV.fetch("KAMAL_BUILDER_REMOTE") %>
<% end %>

ssh:
  user: <%= ENV.fetch("KAMAL_SSH_USER", "root") %>
